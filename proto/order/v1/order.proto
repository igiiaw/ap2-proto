// proto/order/v1/order.proto
syntax = "proto3";

package order.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/igiiaw/ap2-proto-gen/gen/go/order/v1;orderv1";

service OrderService {
  // Server-side streaming: emits one OrderUpdate per real DB status change,
  // then closes when the order reaches a terminal state (PAID/FAILED/CANCELLED).
  rpc SubscribeToOrderUpdates(SubscribeToOrderUpdatesRequest)
      returns (stream OrderUpdate);
}

message SubscribeToOrderUpdatesRequest {
  string order_id = 1;
}

message OrderUpdate {
  string                     order_id   = 1;
  OrderStatus                status     = 2;
  google.protobuf.Timestamp  updated_at = 3;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING     = 1;
  ORDER_STATUS_PAID        = 2;
  ORDER_STATUS_FAILED      = 3;
  ORDER_STATUS_CANCELLED   = 4;
}