syntax = "proto3";

package payment.v1;

option go_package = "github.com/igiiaw/ap2-proto-gen/gen/go/payment/v1;paymentv1";

service PaymentService {
  rpc ProcessPayment(ProcessPaymentRequest) returns (ProcessPaymentResponse);
  rpc ListPayments(ListPaymentsRequest) returns (ListPaymentsResponse);   // ← THIS LINE
}

message ProcessPaymentRequest {
  string order_id = 1;
  int64  amount   = 2;
}

message ProcessPaymentResponse {
  string        id             = 1;
  string        order_id       = 2;
  string        transaction_id = 3;
  int64         amount         = 4;
  PaymentStatus status         = 5;
}

message ListPaymentsRequest {
  string status = 1;
}

message ListPaymentsResponse {
  repeated ProcessPaymentResponse payments = 1;
}

enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PAYMENT_STATUS_AUTHORIZED  = 1;
  PAYMENT_STATUS_DECLINED    = 2;
}